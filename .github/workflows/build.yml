name: Build EXE

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  workflow_dispatch:

jobs:
  build-exe:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip --no-warn-script-location
          pip install -r requirements.txt --no-warn-script-location
          pip install pyinstaller --no-warn-script-location

      - name: Build EXE
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          pyinstaller --onefile --windowed --name HCPCSFeeApp `
            --hidden-import PyQt6.QtPrintSupport `
            --hidden-import reportlab.graphics `
            --hidden-import pyodbc `
            --hidden-import databricks.sql `
            --hidden-import databricks.sql.client `
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HCPCSFeeApp
          path: dist\HCPCSFeeApp.exe
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: dist\HCPCSFeeApp.exe
