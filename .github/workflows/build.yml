name: Build EXE

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  workflow_dispatch:

jobs:
  build-exe:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip --no-warn-script-location
          pip install -r requirements.txt --no-warn-script-location
          pip install pyinstaller --no-warn-script-location

      - name: Convert app_icon.png to app_icon.ico
        run: |
          python -c "
          from PIL import Image
          img = Image.open('assets/app_icon.png').convert('RGBA')
          img.save('assets/app_icon.ico', format='ICO', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])
          print('Icon converted successfully')
          "

      - name: Build EXE
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          pyinstaller --onefile --windowed --name HCPCSFeeApp `
            --icon=assets/app_icon.ico `
            --add-data "assets;assets" `
            --version-file version_info.txt `
            --hidden-import PyQt6.QtPrintSupport `
            --hidden-import reportlab.graphics `
            --hidden-import pyodbc `
            --hidden-import databricks.sql `
            --hidden-import databricks.sql.client `
            main.py

      - name: Package ZIP
        run: |
          copy assets\app_icon.ico dist\app_icon.ico
          copy Install.ps1 dist\Install.ps1
          copy INSTALL_README.txt dist\INSTALL_README.txt
          cd dist
          Compress-Archive -Force -Path HCPCSFeeApp.exe,Install.ps1,app_icon.ico,INSTALL_README.txt -DestinationPath HCPCSFeeApp-Setup.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HCPCSFeeApp
          path: dist\HCPCSFeeApp-Setup.zip
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            dist\HCPCSFeeApp-Setup.zip
            dist\HCPCSFeeApp.exe
